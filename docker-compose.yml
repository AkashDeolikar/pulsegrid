version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: pulsegrid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       pulsegrid
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pulsegrid_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pulsegrid/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pulsegrid-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./pulsegrid
      dockerfile: Dockerfile
    container_name: pulsegrid-backend
    restart: unless-stopped
    environment:
      PORT:         3000
      NODE_ENV:     production
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      pulsegrid
      DB_USER:      postgres
      DB_PASSWORD:  ${DB_PASSWORD:-pulsegrid_dev}
      REDIS_HOST:   redis
      REDIS_PORT:   6379
      JWT_SECRET:   ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRES_IN: 7d
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data: