name: PulseGrid CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       pulsegrid_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./pulsegrid

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pulsegrid/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply database schema
        env:
          PGPASSWORD: postgres_test
        run: |
          psql -h localhost -U postgres -d pulsegrid_test \
            -f src/db/schema.sql

      - name: Run tests with coverage
        env:
          NODE_ENV:     test
          DB_HOST:      localhost
          DB_PORT:      5432
          DB_NAME:      pulsegrid_test
          DB_USER:      postgres
          DB_PASSWORD:  postgres_test
          REDIS_HOST:   localhost
          REDIS_PORT:   6379
          JWT_SECRET:   ci_test_secret_not_for_production
          JWT_EXPIRES_IN: 7d
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: pulsegrid/coverage/
          retention-days: 7

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./pulsegrid
          push: false
          tags: pulsegrid-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max